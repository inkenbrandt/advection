name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff, flake8, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff flake8 mypy

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Flake8
        run: flake8 src tests

      # The codebase is currently untyped; mypy runs leniently and does not gate
      # the build (see "mypy (if type hints exist)"). It will become enforcing
      # once type annotations are added. Configuration lives in pyproject.toml.
      - name: Mypy (non-blocking until typed)
        run: mypy
        continue-on-error: true

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run test suite
        run: pytest -v
